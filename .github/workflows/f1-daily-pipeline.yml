name: F1 Daily Data Pipeline

on:
  schedule:
    - cron: '0 3 * * *'    # Every day at 3 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  update-and-retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Run data ingestion
        run: uv run src/ingest_data.py

      - name: Run feature engineering
        run: uv run src/create_features_advanced.py

      - name: Prepare ML data
        run: uv run src/prepare_ml_data.py

      - name: Train & Track models with MLflow
        run: uv run src/train_models.py

      - name: Commit any updates
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/ models/ || true
          git commit -m "Automated daily update: $(date)" || echo "No changes to commit"
          git push
